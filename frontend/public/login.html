<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In - Global InvestHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="text-center mb-4">
                <a href="index.html" class="brand-logo d-block mb-2">
                    Global <span class="hub">InvestHub</span>
                </a>
                <p class="text-muted fs-6">Sign in to your account</p>
            </div>
            
            <form action="dashboard.html">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control form-control-dark w-100" placeholder="name@company.com" required>
                </div>
                
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label class="form-label mb-0">Password</label>
                        <a href="#" class="text-teal text-decoration-none" style="font-size: 0.85rem;">Forgot password?</a>
                    </div>
                    <input type="password" class="form-control form-control-dark w-100" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-cyan w-100 mb-4 py-2">Sign In</button>
                
                <div class="text-center" style="font-size: 0.85rem;">
                    <span class="text-muted">Don't have an account?</span> 
                    <a href="#" class="text-teal text-decoration-none">Get Started</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
